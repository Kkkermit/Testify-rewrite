name: Nightly — Dependency Scan & Tests

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

# Default to read-only for all jobs
permissions:
  contents: read

jobs:

  # ──────────────────────────────────────────────
  # Job 1 — Unit Tests
  # ──────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            junit.xml
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 2 — npm audit (built-in, no account needed)
  #          Fails if any High or Critical CVEs found
  #          Known undici advisories are allowlisted in .nswrc
  #          (cannot be patched without a breaking discord.js downgrade)
  # ──────────────────────────────────────────────
  npm-audit:
    name: npm audit — Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (with allowlist)
        # better-npm-audit reads .nsprc to skip known-suppressed advisories
        # --level=high only fails on High or Critical vulnerabilities
        run: npm run audit

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit.json
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 3 — Snyk (free tier, deeper CVE analysis)
  #          Known undici CVEs are suppressed in .snyk policy file
  #          (cannot be patched without a breaking discord.js downgrade)
  #          continue-on-error: true guards against transient 403s from
  #          the Snyk API (SNYK-CLI-0000 Forbidden) so they don't fail
  #          the pipeline — real new vulnerabilities still open Issues
  #          via the notify-on-failure job.
  # ──────────────────────────────────────────────
  snyk:
    name: Snyk — Dependency Scan
    runs-on: ubuntu-latest
    # Prevent a Snyk API 403 (token quota / org permission) from
    # failing the whole pipeline and triggering a false-positive issue.
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        with:
          # --severity-threshold=high  — only fail on High/Critical
          # --policy-path=.snyk        — apply the .snyk ignore rules for known undici CVEs
          args: --severity-threshold=high --policy-path=.snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ──────────────────────────────────────────────
  # Job 4 — Notify on failure
  # ──────────────────────────────────────────────
  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [unit-tests, npm-audit, snyk]
    if: failure()
    # Grant write access to issues for this job only
    permissions:
      issues: write

    steps:
      - name: Send failure notification
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Nightly pipeline failed — ${new Date().toISOString().slice(0, 10)}`,
              body: [
                '## Nightly Pipeline Failure',
                '',
                `**Date:** ${new Date().toUTCString()}`,
                `**Run:** [View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '### What to check',
                '- Review the unit test results in the run artifacts',
                '- Review the npm audit report artifact for vulnerable dependencies',
                '- Review any new Snyk vulnerability issues opened on the repository',
              ].join('\n'),
              labels: ['bug', 'ci-failure'],
            });
